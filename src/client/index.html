<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jarvis</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, sans-serif;
      background: #101418;
      color: #eef3f8;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      background: #101418;
    }

    main {
      width: min(760px, 100%);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
    }

    header,
    form,
    .settings {
      padding: 14px;
      border-bottom: 1px solid #26313a;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    input,
    button {
      min-height: 44px;
      border: 1px solid #34424e;
      border-radius: 6px;
      font-size: 16px;
    }

    input {
      box-sizing: border-box;
      width: 100%;
      padding: 0 12px;
      background: #171d23;
      color: #eef3f8;
    }

    button {
      padding: 0 14px;
      background: #2c7be5;
      color: white;
      font-weight: 700;
    }

    button.secondary {
      background: #27323c;
    }

    button.recording {
      background: #d64545;
    }

    .settings {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .warning {
      margin: 12px 14px 0;
      padding: 10px 12px;
      border: 1px solid #8a5d00;
      border-radius: 6px;
      background: #2d240f;
      color: #ffd98a;
      line-height: 1.4;
    }

    .messages {
      overflow-y: auto;
      padding: 14px;
    }

    .message {
      margin: 0 0 12px;
      padding: 10px 12px;
      border-radius: 8px;
      line-height: 1.4;
      background: #171d23;
      border: 1px solid #26313a;
    }

    .message.user {
      background: #16304c;
    }

    .message.assistant {
      background: #17291f;
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      border-top: 1px solid #26313a;
      border-bottom: 0;
    }

    .status {
      padding: 0 14px 12px;
      min-height: 18px;
      color: #aebbc6;
      font-size: 14px;
    }

    @media (max-width: 520px) {
      .composer {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Jarvis</h1>
      <div class="settings">
        <input id="apiKey" type="password" autocomplete="off" placeholder="X-API-Key">
      </div>
    </header>

    <div id="httpsWarning" class="warning" hidden>Microphone access requires HTTPS. See README for setup instructions.</div>
    <section id="messages" class="messages" aria-live="polite"></section>

    <footer>
      <form id="chatForm" class="composer">
        <input id="message" autocomplete="off" placeholder="Message Jarvis">
        <button type="submit">Send</button>
        <button id="record" class="secondary" type="button">Record</button>
      </form>
      <div id="status" class="status"></div>
    </footer>
  </main>

  <script>
    const apiKeyInput = document.querySelector("#apiKey");
    const chatForm = document.querySelector("#chatForm");
    const messageInput = document.querySelector("#message");
    const messages = document.querySelector("#messages");
    const recordButton = document.querySelector("#record");
    const statusLine = document.querySelector("#status");
    const httpsWarning = document.querySelector("#httpsWarning");

    let sessionId = localStorage.getItem("jarvis_session_id") || "";
    let audioContext = null;
    let mediaStream = null;
    let processor = null;
    let source = null;
    let recordedBuffers = [];
    let recording = false;

    apiKeyInput.value = localStorage.getItem("jarvis_api_key") || "";
    apiKeyInput.addEventListener("input", () => {
      localStorage.setItem("jarvis_api_key", apiKeyInput.value.trim());
    });

    function apiKey() {
      return apiKeyInput.value.trim();
    }

    function setStatus(text) {
      statusLine.textContent = text;
    }

    function addMessage(role, text) {
      const item = document.createElement("div");
      item.className = `message ${role}`;
      item.textContent = `${role === "user" ? "You" : "Jarvis"}: ${text}`;
      messages.appendChild(item);
      messages.scrollTop = messages.scrollHeight;
    }

    function headers() {
      return {
        "Content-Type": "application/json",
        "X-API-Key": apiKey()
      };
    }

    function rememberSession(id) {
      if (!id) return;
      sessionId = id;
      localStorage.setItem("jarvis_session_id", id);
    }

    function requiresHttpsForMic() {
      return window.location.protocol !== "https:"
        && window.location.hostname !== "localhost"
        && window.location.hostname !== "127.0.0.1";
    }

    async function sendChat(text) {
      addMessage("user", text);
      setStatus("Sending...");
      const response = await fetch("/chat", {
        method: "POST",
        headers: headers(),
        body: JSON.stringify({ message: text, session_id: sessionId || null })
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.detail || data.error || "Chat request failed");
      rememberSession(data.session_id);
      addMessage("assistant", data.response);
      setStatus("");
    }

    chatForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const text = messageInput.value.trim();
      if (!text) return;
      messageInput.value = "";
      try {
        await sendChat(text);
      } catch (error) {
        setStatus(error.message);
      }
    });

    function mergeBuffers(buffers) {
      const length = buffers.reduce((total, buffer) => total + buffer.length, 0);
      const result = new Float32Array(length);
      let offset = 0;
      for (const buffer of buffers) {
        result.set(buffer, offset);
        offset += buffer.length;
      }
      return result;
    }

    function encodeWav(samples, sampleRate) {
      const buffer = new ArrayBuffer(44 + samples.length * 2);
      const view = new DataView(buffer);

      function writeString(offset, text) {
        for (let index = 0; index < text.length; index += 1) {
          view.setUint8(offset + index, text.charCodeAt(index));
        }
      }

      writeString(0, "RIFF");
      view.setUint32(4, 36 + samples.length * 2, true);
      writeString(8, "WAVE");
      writeString(12, "fmt ");
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeString(36, "data");
      view.setUint32(40, samples.length * 2, true);

      let offset = 44;
      for (const sample of samples) {
        const clamped = Math.max(-1, Math.min(1, sample));
        view.setInt16(offset, clamped < 0 ? clamped * 0x8000 : clamped * 0x7fff, true);
        offset += 2;
      }

      return new Blob([view], { type: "audio/wav" });
    }

    async function startRecording() {
      if (!apiKey()) throw new Error("Enter your API key first.");
      if (requiresHttpsForMic()) {
        httpsWarning.hidden = false;
        throw new Error("Microphone access requires HTTPS. See README for setup instructions.");
      }

      recordedBuffers = [];
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      audioContext = new AudioContextClass();
      source = audioContext.createMediaStreamSource(mediaStream);
      processor = audioContext.createScriptProcessor(4096, 1, 1);
      processor.onaudioprocess = (event) => {
        recordedBuffers.push(new Float32Array(event.inputBuffer.getChannelData(0)));
      };
      source.connect(processor);
      processor.connect(audioContext.destination);
      recording = true;
      recordButton.classList.add("recording");
      recordButton.textContent = "Stop";
      setStatus("Recording...");
    }

    async function stopRecording() {
      recording = false;
      recordButton.classList.remove("recording");
      recordButton.textContent = "Record";
      processor.disconnect();
      source.disconnect();
      mediaStream.getTracks().forEach((track) => track.stop());

      const wav = encodeWav(mergeBuffers(recordedBuffers), audioContext.sampleRate);
      await audioContext.close();

      const formData = new FormData();
      formData.append("audio", wav, "recording.wav");
      if (sessionId) formData.append("session_id", sessionId);

      setStatus("Transcribing...");
      const response = await fetch("/voice", {
        method: "POST",
        headers: { "X-API-Key": apiKey() },
        body: formData
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.detail || data.error || "Voice request failed");
      rememberSession(data.session_id);
      addMessage("user", data.transcription);
      addMessage("assistant", data.response);
      setStatus("");
    }

    recordButton.addEventListener("click", async () => {
      try {
        if (recording) {
          await stopRecording();
        } else {
          await startRecording();
        }
      } catch (error) {
        setStatus(error.message);
      }
    });
  </script>
</body>
</html>
