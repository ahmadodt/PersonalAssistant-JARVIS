services:
  jarvis:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Keep local models, voices, memory, and logs outside the image.
      - ./models:/app/models
      - ./voices:/app/voices
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
